services:
  lock-room-api:
    build:
      context: ./lock-room-api
      dockerfile: Dockerfile
    container_name: lock-room-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PORT=${API_PORT:-3000}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - SERVER_MASTER_KEY=${SERVER_MASTER_KEY}
      - MAX_REQUESTS_PER_MINUTE=${MAX_REQUESTS_PER_MINUTE:-100}
      - NODE_ENV=production
    networks:
      - coolify

  lock-room-front:
    build:
      context: ./lock-room-front
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_APP_TITLE=${VITE_APP_TITLE:-Lock Room}
    container_name: lock-room-front
    restart: unless-stopped
    environment:
      - PORT=${FRONT_PORT:-3000}
    depends_on:
      - lock-room-api
    networks:
      - coolify

networks:
  coolify:
    external: true
